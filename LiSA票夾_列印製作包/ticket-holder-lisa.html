<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LiSA 15th Taipei Ticket Holder</title>
  <link rel="stylesheet" href="assets/ticket-holder.css">
</head>
<body>
  <main class="page" aria-label="LiSA 15th Taipei ticket holder A4 artwork">
    <aside class="print-note">
      <div class="note-badge">票<br>夾<br>模<br>板</div>
      <div class="note-copy">請以A4尺寸列印</div>
    </aside>

    <section class="holder">
      <div class="bleed-grid"></div>
      <div class="pink-noise"></div>
      <div class="cut border"></div>
      <div class="fold fold-top"></div>
      <div class="fold fold-mid"></div>
      <div class="tab tab-left"></div>
      <div class="tab tab-right"></div>

      <section class="upper-panel upside-down">
        <img class="upper-art" src="素材/669036261_1476090733881363_773819450042997474_n.jpg" alt="">
        <div class="upper-wash"></div>
        <div class="upper-copy">
          <div class="eyebrow">ASIA TOUR 2026</div>
          <h1>LiSA</h1>
          <h2>LiVE is Smile Always <span>~15~</span></h2>
          <p>JUN 19 2026 | 6 PM<br>TAIPEI ARENA</p>
        </div>
        <div class="strawberry strawberry-one">15</div>
        <div class="star star-a"></div>
        <div class="star star-b"></div>
      </section>

      <section class="lower-panel">
        <div class="title-block">
          <div class="kicker">LiSA 15th Taipei Fan Ticket Holder</div>
          <h2>LiVE is Smile<br>Always <span>~15~</span></h2>
          <p>2026.06.19 FRI | 18:00<br>TAIPEI ARENA</p>
        </div>

        <figure class="main-photo">
          <img src="素材/650996790_1455269059296864_7153961107339767219_n.jpg" alt="">
        </figure>

        <div class="photo-strip">
          <figure><img src="素材/662910887_1473856544104782_1797694666298698514_n.jpg" alt=""><figcaption>TAIPEI</figcaption></figure>
          <figure><img src="素材/667863751_1476061287217641_1401771218230708810_n.jpg" alt=""><figcaption>DECOTORA15</figcaption></figure>
          <figure><img src="素材/669036261_1476090733881363_773819450042997474_n.jpg" alt=""><figcaption>LACE UP</figcaption></figure>
        </div>

        <div class="pill pill-left">LiSA 15th ASIA TOUR</div>
        <div class="pill pill-right">LiVE is Smile Always</div>
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="scribble">x x x</div>
      </section>
    </section>
  </main>
</body>
</html>
